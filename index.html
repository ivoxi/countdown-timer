<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timer</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="header">
      <h1>Simple timer</h1>
    </header>
    <main>
      <section class="timer">
        <div class="timer-display">
          <span class="hours">00</span>
          <input
            id="hours-input"
            class="timer-input"
            type="number"
            min="0"
            max="99"
            placeholder="00"
            hidden
          />
          <span class="separator">:</span>
          <span class="minutes">00</span>
          <input
            id="minutes-input"
            class="timer-input"
            type="number"
            min="0"
            max="59"
            placeholder="00"
            hidden
          />
          <span class="separator">:</span>
          <span class="seconds">00</span>
          <input
            id="seconds-input"
            class="timer-input"
            type="number"
            min="0"
            max="59"
            placeholder="00"
            hidden
          />
        </div>
        <button type="button" class="apply-btn">Apply</button>
        <div class="timer-controls">
          <button type="button" class="start-btn">
            <img src="/src/source/start-ico.svg" alt="start-btn" srcset="" />
          </button>
          <button type="button" class="pause-btn">
            <img src="/src/source/pause-ico.svg" alt="pause-btn" srcset="" />
          </button>
          <button type="button" class="reset-btn">
            <img
              src="/src/source/restart-ico.svg"
              alt="restart-btn"
              srcset=""
            />
          </button>
        </div>
      </section>
    </main>
    <footer></footer>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
